<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopSphere{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f59e0b;
            --dark: #0f172a;
            --dark-2: #1e293b;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 10px 30px rgba(0,0,0,.08);
            --transition: all .2s cubic-bezier(.4,0,.2,1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--surface-2);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        main { flex: 1; }

        a { color: var(--primary); text-decoration: none; transition: var(--transition); }
        a:hover { color: var(--primary-dark); }

        /* ── Navbar ── */
        .ss-navbar {
            background: var(--dark);
            border-bottom: 1px solid rgba(255,255,255,.06);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .ss-navbar .container { height: 64px; display: flex; align-items: center; gap: 24px; }
        .ss-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff !important;
            letter-spacing: -.3px;
            white-space: nowrap;
        }
        .ss-brand span { color: var(--accent); }
        .ss-search {
            flex: 1;
            max-width: 420px;
            position: relative;
        }
        .ss-search input {
            width: 100%;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 8px;
            color: #fff;
            padding: 8px 16px 8px 40px;
            font-size: .875rem;
            transition: var(--transition);
            outline: none;
        }
        .ss-search input::placeholder { color: rgba(255,255,255,.4); }
        .ss-search input:focus { background: rgba(255,255,255,.12); border-color: var(--primary); }
        .ss-search .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,.4);
            font-size: .875rem;
        }
        .ss-nav-links { display: flex; align-items: center; gap: 4px; margin-left: auto; }
        .ss-nav-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-size: .8125rem;
            font-weight: 500;
            color: rgba(255,255,255,.75);
            border: 1px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
        }
        .ss-nav-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
        .ss-nav-btn.active { color: #fff; }
        .ss-nav-btn.btn-login { background: var(--primary); color: #fff; border-color: var(--primary); }
        .ss-nav-btn.btn-login:hover { background: var(--primary-dark); }
        .ss-nav-btn.btn-register { border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.85); }
        .ss-nav-btn.btn-register:hover { border-color: rgba(255,255,255,.4); color: #fff; }
        .ss-nav-btn.btn-logout { color: #fca5a5; }
        .ss-nav-btn.btn-logout:hover { background: rgba(239,68,68,.15); color: #f87171; }
        .cart-badge {
            background: var(--accent);
            color: var(--dark);
            font-size: .65rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 20px;
        }
        .ss-divider { width: 1px; height: 20px; background: rgba(255,255,255,.1); margin: 0 4px; }
        .ss-user-chip {
            font-size: .8rem;
            color: rgba(255,255,255,.5);
            padding: 0 8px;
        }

        /* ── Cards ── */
        .ss-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
            overflow: hidden;
        }
        .ss-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        /* ── Product image ── */
        .product-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background: var(--surface-2);
        }
        .product-img-placeholder {
            width: 100%;
            height: 210px;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 2rem;
        }

        /* ── Buttons ── */
        .btn-ss-primary {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 9px 20px;
            font-size: .875rem;
            font-weight: 500;
            transition: var(--transition);
        }
        .btn-ss-primary:hover { background: var(--primary-dark); color: #fff; transform: translateY(-1px); }
        .btn-ss-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 20px;
            font-size: .875rem;
            font-weight: 500;
            transition: var(--transition);
        }
        .btn-ss-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-ss-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            padding: 9px 16px;
            font-size: .875rem;
            transition: var(--transition);
        }
        .btn-ss-danger:hover { background: #fef2f2; }
        .btn-ss-success {
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 9px 20px;
            font-size: .875rem;
            font-weight: 500;
            transition: var(--transition);
        }
        .btn-ss-success:hover { background: #059669; color: #fff; }

        /* ── Badges ── */
        .ss-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .3px;
            text-transform: uppercase;
        }
        .ss-badge-category { background: #eff6ff; color: var(--primary); }
        .ss-badge-tag { background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border); }
        .ss-badge-success { background: #ecfdf5; color: var(--success); }
        .ss-badge-warning { background: #fffbeb; color: #d97706; }
        .ss-badge-danger { background: #fef2f2; color: var(--danger); }
        .ss-badge-info { background: #eff6ff; color: #3b82f6; }

        /* ── Stars ── */
        .ss-stars { color: #f59e0b; letter-spacing: 1px; }

        /* ── Section title ── */
        .ss-section-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -.2px;
        }

        /* ── Filter sidebar ── */
        .ss-filter-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .ss-filter-title { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); margin-bottom: 8px; }
        .ss-filter-card .form-control,
        .ss-filter-card .form-select {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: .875rem;
            padding: 8px 12px;
            color: var(--text);
            background: var(--surface-2);
            transition: var(--transition);
        }
        .ss-filter-card .form-control:focus,
        .ss-filter-card .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }

        /* ── Table ── */
        .ss-table { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
        .ss-table table { margin: 0; }
        .ss-table thead th { background: var(--dark); color: rgba(255,255,255,.85); font-size: .8rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 14px 16px; border: none; }
        .ss-table tbody td { padding: 14px 16px; border-color: var(--border); vertical-align: middle; font-size: .9rem; }
        .ss-table tbody tr:hover { background: var(--surface-2); }

        /* ── Form inputs ── */
        .ss-input {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: .9rem;
            width: 100%;
            transition: var(--transition);
            background: var(--surface);
            color: var(--text);
        }
        .ss-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .ss-label { font-size: .8125rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .4px; }

        /* ── Auth card ── */
        .ss-auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; box-shadow: var(--shadow-md); }

        /* ── Alert ── */
        .ss-alert { border-radius: var(--radius-sm); padding: 12px 16px; font-size: .875rem; border: none; display: flex; align-items: center; gap: 10px; }
        .ss-alert-success { background: #ecfdf5; color: #065f46; }
        .ss-alert-danger { background: #fef2f2; color: #991b1b; }
        .ss-alert-info { background: #eff6ff; color: #1e40af; }
        .ss-alert-warning { background: #fffbeb; color: #92400e; }
        .ss-alert-secondary { background: #f8fafc; color: #475569; }

        /* ── Footer ── */
        .ss-footer {
            background: var(--dark);
            color: rgba(255,255,255,.4);
            text-align: center;
            padding: 24px;
            font-size: .8125rem;
            margin-top: auto;
        }
        .ss-footer a { color: rgba(255,255,255,.5); }
        .ss-footer a:hover { color: rgba(255,255,255,.8); }

        /* ── Pagination ── */
        .ss-pagination .page-link {
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: var(--radius-sm) !important;
            margin: 0 2px;
            padding: 7px 13px;
            font-size: .875rem;
            transition: var(--transition);
        }
        .ss-pagination .page-link:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .ss-pagination .page-item.active .page-link { background: var(--primary); border-color: var(--primary); color: #fff; }

        /* ── Misc ── */
        .price-tag { font-size: 1.25rem; font-weight: 700; color: var(--success); }
        .price-tag-sm { font-size: 1rem; font-weight: 700; color: var(--success); }
        .text-ss-muted { color: var(--text-muted); }
        .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

        /* ── Navbar toggler mobile ── */
        @media (max-width: 768px) {
            .ss-search { max-width: 100%; }
            .ss-navbar .container { flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 12px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

{% include "partials/_navbar.html" %}
{% include "partials/_messages.html" %}

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

<footer class="ss-footer">
    &copy; 2025 ShopSphere &mdash; Built with Django &amp; PostgreSQL &nbsp;·&nbsp;
    <a href="{% url 'product_list' %}">Shop</a> &nbsp;·&nbsp;
    <a href="/api/v1/products/">API</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
